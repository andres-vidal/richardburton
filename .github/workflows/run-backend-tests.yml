name: Run backend app tests
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
  pull-requests: write
jobs:
  ExUnit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "backend"
    services:
      db:
        image: postgres:15.1
        ports: ["5432:5432"]
        env:
          POSTGRES_PASSWORD: postgres
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v3
      - uses: erlef/setup-beam@v1
        with:
          version-type: strict
          version-file: backend/.tool-versions
      - run: echo -e "import Config\nconfig :richard_burton, []" >> config/dev.local.exs
      - run: mix deps.get
      # `mix coveralls` runs the suite (via the `test` alias, so ecto setup still
      # happens) and prints a per-module coverage table. It fails on any test
      # failure, so this remains the gating test check; coverage is track-only
      # (no threshold) to establish a baseline. Tee the table so the PR comment
      # step below can read the total (the runner's bash uses pipefail, so a test
      # failure still fails this step). The `.local.` name is already gitignored.
      - run: mix coveralls | tee coverage.local.txt
      - name: Comment coverage on the PR
        if: ${{ success() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const out = fs.readFileSync("backend/coverage.local.txt", "utf8");
            const total = out.match(/\[TOTAL\]\s+([\d.]+)%/)?.[1] ?? "n/a";
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = "<!-- coverage: backend -->";
            const body = `${marker}\n### 🧪 Backend line coverage: **${total}%**\n\nTrack-only baseline · full per-module breakdown in the [job log](${run}).`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const prev = comments.find((c) => c.body?.includes(marker));
            if (prev) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: prev.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
